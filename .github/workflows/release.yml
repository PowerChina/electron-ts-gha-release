name: Release Electron App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_cmd: npm run dist -- --win nsis
            artifact_name: windows-release
            artifact_path: |
              release/*.exe
              release/*.yml
              release/*.blockmap
          - os: macos-13
            platform: mac-intel
            build_cmd: npm run dist -- --mac dmg zip --x64
            artifact_name: mac-intel-release
            artifact_path: |
              release/*.dmg
              release/*-mac.zip
              release/*.yml
              release/*.blockmap

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build ${{ matrix.platform }} package
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Create/Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
          fail_on_unmatched_files: false
