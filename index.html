<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron TS Starter</title>
    <style>
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        height: 100vh;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 24px;
        max-width: 640px;
        text-align: center;
        background: #111827;
      }
      code { color: #38bdf8; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Electron + TypeScript</h1>
      <p>打包产物会在 <code>release/</code> 目录下。</p>
      <p>Windows 下默认生成 NSIS 安装包 <code>.exe</code>。</p>
    </div>
  </body>
</html>
